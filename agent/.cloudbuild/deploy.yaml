steps:
  # Build and Push
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args: ['-c', 'docker pull ${_REGION}-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME:latest || exit 0']
  - name: "gcr.io/cloud-builders/docker"
    env:
      - 'DOCKER_BUILDKIT=1'
    args:
      [
        "build",
        "-t",
        "${_REGION}-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME:${_COMMIT_SHA}",
        "-t",
        "${_REGION}-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME:latest",
        "--cache-from",
        "${_REGION}-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME:latest",
        ".",
      ]
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "push",
        "${_REGION}-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME:${_COMMIT_SHA}",
      ]
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "push",
        "${_REGION}-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME:latest",
      ]

  # Deploy to GKE
  - name: "gcr.io/cloud-builders/gcloud"
    id: get-credentials
    entrypoint: gcloud
    args:
      - "container"
      - "clusters"
      - "get-credentials"
      - "${_CLUSTER_NAME}"
      - "--region"
      - "${_CLUSTER_REGION}"
      - "--project"
      - "${PROJECT_ID}"

  - name: "gcr.io/cloud-builders/kubectl"
    id: deploy-gke
    args:
      - "apply"
      - "-f"
      - "../k8s/configmap.yaml"
      - "-f"
      - "../k8s/agent-deployment.yaml"
      - "-f"
      - "../k8s/agent-service.yaml"

substitutions:
  _REGION: ${_REGION}
  _ARTIFACT_REGISTRY_REPO_NAME: building-permit
  _CONTAINER_NAME: building-permit-agent
  _COMMIT_SHA: ${_COMMIT_SHA}
  _DOCUMENT_AI_LOCATION: us
  _DOCUMENT_AI_PROCESSOR_ID: 24ec41d66617b372
  _VERTEX_RAG_CORPUS_NAME: projects/${PROJECT_ID}/locations/us-west1/ragCorpora/4611686018427387904
  _REASONING_ENGINE_APP_NAME: projects/${PROJECT_ID}/locations/${_REGION}/reasoningEngines/3166398874436763648
  _GEMINI_MODEL_NAME: gemini-2.5-pro

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME:${_COMMIT_SHA}
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME:latest

options:
  pool:
  logging: CLOUD_LOGGING_ONLY
  substitutionOption: ALLOW_LOOSE
  requestedVerifyOption: VERIFIED
