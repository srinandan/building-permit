steps:
  # Build and Push
  - name: "gcr.io/cloud-builders/docker"
    env:
      - 'DOCKER_BUILDKIT=1'
    args:
      [
        "build",
        "--build-arg",
        "PROJECT_ID=${PROJECT_ID}",
        "-t",
        "${_REGION}-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME:${_COMMIT_SHA}",
        ".",
      ]
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "push",
        "${_REGION}-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME:${_COMMIT_SHA}",
      ]

  # Deploy to Staging
  - name: "gcr.io/cloud-builders/gcloud"
    id: deploy-staging
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "${_CONTAINER_NAME}"
      - "--project"
      - "${PROJECT_ID}"
      - "--region"
      - "${_REGION}"
      - "--image"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME:${_COMMIT_SHA}"
      - "--port"
      - "3000"
      - "--cpu"
      - "1000m"
      - "--memory"
      - "1Gi"
      - "--concurrency"
      - "10"
      - "--service-account"
      - "build-permit-sa@${PROJECT_ID}.iam.gserviceaccount.com"
      - "--set-env-vars"
      - 'API_BACKEND_SERVICE_URL=https://building-permit-api-${PROJECT_NUMBER}.${_REGION}.run.app,GOOGLE_CLOUD_LOCATION=${_REGION}'
      - "--startup-probe"
      - 'initialDelaySeconds=30,tcpSocket.port=3000,timeoutSeconds=240,periodSeconds=240,failureThreshold=1'
      - "--max-instances"
      - "1"
      - "--allow-unauthenticated"
      - "--timeout"
      - "300"
      - "--cpu-boost"
      - "--session-affinity"
      - "--labels=appid=building-permit"

substitutions:
  _REGION: us-central1
  _ARTIFACT_REGISTRY_REPO_NAME: building-permit
  _CONTAINER_NAME: building-permit-frontend
  _COMMIT_SHA: latest

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME:${_COMMIT_SHA}

options:
  logging: CLOUD_LOGGING_ONLY
  substitutionOption: ALLOW_LOOSE
  requestedVerifyOption: VERIFIED
